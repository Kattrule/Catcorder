<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ljudinspelare</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #ffffff;
            --accent: #ef4444; /* Röd för inspelning */
            --accent-hover: #dc2626;
            --text-muted: #94a3b8;
            --success: #10b981;
        }

        * { color: var(--text-color); font-family: Arial, sans-serif; box-sizing: border-box; }
        body, html { margin: 0; padding: 0; min-height: 100%; background: var(--bg-color); display: flex; justify-content: center; align-items: center; }
        
        .app-container { background: var(--card-bg); width: 100%; max-width: 400px; padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5); margin: 20px; }
        
        h1 { margin-top: 0; font-size: 1.8rem; }
        p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 30px; }

        /* Inspelningsknapp */
        .record-btn {
            background: var(--accent);
            border: none;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px auto;
        }
        
        .record-btn:active { transform: scale(0.9); }
        
        .record-btn.recording {
            animation: pulse 1.5s infinite;
            border-radius: 20%; /* Blir fyrkantig när den spelar in (stop-symbol) */
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .status { font-weight: bold; margin-bottom: 20px; height: 20px; }

        /* Ljudspelare */
        audio { width: 100%; margin-top: 20px; outline: none; border-radius: 30px; }
        
        /* Nedladdningsknapp */
        .download-btn {
            display: none;
            background: var(--success);
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: bold;
            margin-top: 20px;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="app-container">
    <h1>Ljudinspelare</h1>
    <p>Spela in röstanteckningar direkt i webbläsaren.</p>

    <button id="recordBtn" class="record-btn">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
            <path id="btnIcon" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5-3c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
    </button>

    <div id="status" class="status">Tryck för att starta</div>

    <audio id="audioPlayer" controls style="display: none;"></audio>
    <a id="downloadLink" class="download-btn" href="#">Ladda ner inspelning</a>
</div>

<script>
    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;

    const recordBtn = document.getElementById('recordBtn');
    const statusText = document.getElementById('status');
    const audioPlayer = document.getElementById('audioPlayer');
    const downloadLink = document.getElementById('downloadLink');
    const btnIcon = document.getElementById('btnIcon');

    // Kolla om webbläsaren stöder ljudinspelning
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        statusText.innerText = "Din webbläsare stöder inte ljudinspelning.";
        statusText.style.color = "var(--accent)";
        recordBtn.style.display = "none";
    }

    recordBtn.addEventListener('click', async () => {
        if (!isRecording) {
            await startRecording();
        } else {
            stopRecording();
        }
    });

    async function startRecording() {
        try {
            // Be om tillåtelse att använda mikrofonen
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            
            mediaRecorder.start();
            isRecording = true;
            audioChunks = [];

            // UI-uppdateringar
            recordBtn.classList.add('recording');
            statusText.innerText = "Spelar in... (tryck igen för att stoppa)";
            statusText.style.color = "var(--accent)";
            audioPlayer.style.display = "none";
            downloadLink.style.display = "none";
            // Byt ikon till en stopp-fyrkant
            btnIcon.setAttribute('d', 'M6 6h12v12H6z');

            // Spara datan allt eftersom den kommer in
            mediaRecorder.addEventListener("dataavailable", event => {
                audioChunks.push(event.data);
            });

            // Vad som händer när vi stoppar
            mediaRecorder.addEventListener("stop", () => {
                const audioBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
                const audioUrl = URL.createObjectURL(audioBlob);
                
                audioPlayer.src = audioUrl;
                audioPlayer.style.display = "block";
                
                // Ställ in nedladdningslänken. Filändelsen beror på enhet (.webm eller .mp4)
                const extension = mediaRecorder.mimeType.includes("mp4") ? "mp4" : "webm";
                downloadLink.href = audioUrl;
                downloadLink.download = `inspelning-${new Date().getTime()}.${extension}`;
                downloadLink.style.display = "inline-block";

                // Stäng av mikrofonen helt så den inte drar batteri
                stream.getTracks().forEach(track => track.stop());
            });

        } catch (err) {
            console.error("Fel vid inspelning:", err);
            statusText.innerText = "Åtkomst till mikrofon nekad.";
            statusText.style.color = "var(--accent)";
        }
    }

    function stopRecording() {
        if (mediaRecorder && mediaRecorder.state !== "inactive") {
            mediaRecorder.stop();
            isRecording = false;
            
            // UI-uppdateringar
            recordBtn.classList.remove('recording');
            statusText.innerText = "Inspelning sparad!";
            statusText.style.color = "var(--success)";
            // Byt ikon tillbaka till mikrofon
            btnIcon.setAttribute('d', 'M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5-3c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z');
        }
    }

    // Registrera Service Worker för PWA
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
            .then(() => console.log("Service Worker registrerad"))
            .catch(err => console.log("SW fel:", err));
    }
</script>
</body>
</html>
